# ----------------------------------------------------------------------------
# GitHub Action workflow to
#
# - test CGE compilation and automatic tests
# - pack CGE into zip
#
# on some platforms for which
#
# - we don't use Docker
# - we don't use cross-compilation from other platform
# - we just use a runner with the given platform - self-hosted or GH hosted.
# ----------------------------------------------------------------------------

name: Test and Pack (Runner Native)

# Called by everything.yml
on:
  workflow_call:
    # We need to declare secrets that must be passed here.
    # See https://docs.github.com/en/actions/how-tos/reuse-automations/reuse-workflows
    secrets:
      APPLE_BUILD_CERTIFICATE_BASE64:
        required: true
      APPLE_P12_PASSWORD:
        required: true
      APPLE_KEYCHAIN_PASSWORD:
        required: true
      APPLE_APP_PASSWORD:
        required: true
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
  # push:
  # pull_request:

defaults:
  run:
    shell: bash

# GitHub CodeQL recommends to explicitly set permissions for GITHUB_TOKEN.
# See https://docs.github.com/en/actions/tutorials/authenticate-with-github_token .
# Moreover, we need id-token: write to allow Azure federated login.
permissions:
  contents: read
  id-token: write

jobs:
  test_and_pack:
    name: Test and Pack
    strategy:
      matrix:
        # Job names correspond to target OS/CPU for this build.
        # We follow FPC and CGE conventions for OS/CPU names.
        job-name: [
          darwin-x86_64,
          darwin-aarch64,
          linux-x86_64,
          win64-x86_64,
          win32-i386
        ]
        include:
          # Specify runner and OS/CPU.
          #
          # Note: In *most* jobs, the build_os/build_cpu is equivalent to getting
          # them by `fpc -iTO` and `fpc -iTP` on the runner, but it is
          # not the case for win32.
          #
          # Note: windows-latest is used twice, for win32 and win64 builds.

          - job-name: darwin-x86_64
            runner: macos-15-intel
            build_os: darwin
            build_cpu: x86_64

          - job-name: darwin-aarch64
            runner: macos-latest
            build_os: darwin
            build_cpu: aarch64

          - job-name: linux-x86_64
            # TODO: Using ubuntu-22.04 instead of ubuntu-latest as a workaround
            # for zip crashes, see test-and-pack-docker.yml notes.
            # runner: ubuntu-latest
            runner: ubuntu-22.04
            build_os: linux
            build_cpu: x86_64

          - job-name: win64-x86_64
            runner: windows-latest
            build_os: win64
            build_cpu: x86_64

          - job-name: win32-i386
            runner: windows-latest
            build_os: win32
            build_cpu: i386

    runs-on: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@v7

    - name: Install FPC+Lazarus
      run: |
        cd /tmp/
        git clone https://github.com/castle-engine/castle-build-ci.git --depth=1 --single-branch --branch=master
        castle-build-ci/install_dependencies
        # Use setup_castle_engine to install FPC and Lazarus, not CGE.
        # Install on build_os/cpu: In case of win32, these would not be autodetected
        # as default on this platform.
        castle-build-ci/setup_castle_engine --install-castle-engine=false --install-lazarus=true \
          --os=${{ matrix.build_os }} --cpu=${{ matrix.build_cpu }}

    - name: Install macOS dependencies
      if: ${{ runner.os == 'macOS' }}
      run: brew install gnu-sed coreutils findutils 7zip

    - name: Install Windows dependencies
      if: ${{ runner.os == 'Windows' }}
      # We need Inno Setup for creating Windows installer.
      #   Note: Inno Setup seems already available on windows-latest.
      #   For future-proof, just keep it declared here.
      # wget to later get pasdoc.
      # zip is used by pack_release.
      run: choco install innosetup wget zip

    - name: Adjust Windows bash behavior
      if: ${{ runner.os == 'Windows' }}
      run: |
        # force Git Bash
        echo "WINDOWS_FORCE_GIT_BASH=true" >> $GITHUB_ENV

        # see use_cygpath_not_msys_automatic_conversions.md
        echo "MSYS2_ENV_CONV_EXCL=*" >> $GITHUB_ENV
        echo "MSYS2_ARG_CONV_EXCL=*" >> $GITHUB_ENV
        echo "MSYS_NO_PATHCONV=1" >> $GITHUB_ENV

    - name: Set environment CASTLE_ENGINE_PATH
      run: echo "CASTLE_ENGINE_PATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV
    # Convert CASTLE_ENGINE_PATH to use slashes on Windows.
    # Most of the build commands actually honor Windows backslashes as well
    # as slashes in $CASTLE_ENGINE_PATH. Exception is the Makefile assignments
    # done on PREFIX variable, they go badly with
    #   "make clean tools install PREFIX=${CASTLE_ENGINE_PATH}/installed/"
    # resulting in weird installation directory (backslashes are stripped
    # during Makefile assignments and the build tool data gets copied to weird
    # subdirectory under build-tool/data/).
    - name: Make CASTLE_ENGINE_PATH use / (Windows)
      if: ${{ runner.os == 'Windows' }}
      run: echo "CASTLE_ENGINE_PATH=`cygpath --mixed \"${CASTLE_ENGINE_PATH}\"`" >> $GITHUB_ENV

    # We can pass to $GITHUB_PATH a native path, even on Windows
    # (where $PATH, under MSys, is separated by : and requires Unix paths).
    - name: Extend $PATH
      run: |
        echo "${CASTLE_ENGINE_PATH}/installed/bin/" >> $GITHUB_PATH
        echo "${GITHUB_WORKSPACE}/pasdoc/bin/" >> $GITHUB_PATH

    # check versions (and availability) of our requirements early
    - name: (Info) FPC version, OS, CPU
      run: |
        fpc -iV
        fpc -iTO
        fpc -iTP
    - name: (Info) Lazarus version
      run: lazbuild --version
    - name: (Info) Make version
      run: make --version
    # Make sure we got GNU "make", not Embarcadero "make".
    # This is important, as Delphi installer inserts Embarcadero "make" into PATH,
    # earlier than Cygwin's. It has to be corrected after installation.
    - name: (Info) Check GNU Make
      run: if make -version 2>&1 | grep -i "GNU Make" -; then echo "OK, make from GNU"; else echo "ERROR, make not from GNU!"; exit 1; fi

    - name: Build Tools
      run: |
        rm -Rf installed/
        mkdir -p installed/
        make clean tools install PREFIX=${CASTLE_ENGINE_PATH}/installed/

    - name: Build Examples
      # TODO: Don't build on macos-15-intel, takes too long and we lose connection to runner?
      # TODO: Don't build on macos-latest, takes too long and floods log with
      # "ld: warning: object file (/Users/runner/work/castle-game/castle-game/castle-engine/tools/build-tool/castle-engine-output/build-tool-compilation/castle_engine.o) was built for newer 'macOS' version (11.0) than being linked (10.15)" .
      # Reconsider once we have eliminated the above warnings.
      #if: ${{ matrix.build_os != 'darwin' }}
      # TODO: Skip examples, for quick test of recent macOS work
      if: false
      run: make clean examples CASTLE_CONSERVE_DISK_SPACE=true

    - name: Build And Run Auto-Tests
      run: make tests

    # TODO: Set $FPCDIR, and make this work.
    # With castle-fpc, we have full control over our FPC install, we should make it work.
    # - name: Build Using FpMake
    #   run: make clean test-fpmake

    - name: Build Lazarus Packages
      run: |
        lazbuild packages/lazarus/castle_engine_base.lpk
        lazbuild packages/lazarus/castle_engine_window.lpk
        lazbuild packages/lazarus/castle_engine_lcl.lpk
        lazbuild packages/lazarus/castle_engine_editor_components.lpk
        lazbuild packages/lazarus/alternative_castle_engine_window_based_on_lcl.lpk

    # TODO: also run examples-laz here

    - name: Build and Install PasDoc
      run: |
        wget --progress=bar:force:noscroll \
          https://github.com/pasdoc/pasdoc/archive/refs/heads/master.zip \
          --output-document pasdoc-master.zip

        # Prefer to use 7zz, installed from https://formulae.brew.sh/formula/sevenzip#default ,
        # because unzip fails to unpack zip with umlaults on macOS,
        # which PasDoc uses for our tests:
        # https://github.com/pasdoc/pasdoc/tree/master/tests/testcases_output/html/ok_unicode_identifiers_utf8
        if command -v 7zz >/dev/null 2>&1; then 7zz x pasdoc-master.zip; else unzip -q pasdoc-master.zip; fi

        mv pasdoc-master pasdoc
        cd pasdoc
        make
        bin/pasdoc --version # check it's OK

    - name: Azure Login (for Windows CodeSigning)
      # Sign for Windows only on chosen branches,
      # because Azure federated login only works on specific branches.
      if: ${{ runner.os == 'Windows' && ( github.ref == 'refs/heads/master' || github.ref == 'refs/heads/windows-code-signing' ) }}
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Setup for CodeSigning
      # same as azure/login condition
      if: ${{ runner.os == 'Windows' && ( github.ref == 'refs/heads/master' || github.ref == 'refs/heads/windows-code-signing' ) }}
      run: |
        export AZURE_SIGNING_CLIENT_PARENT="$RUNNER_TEMP/sign-tools/"
        echo "AZURE_SIGNING_CLIENT_PARENT=${AZURE_SIGNING_CLIENT_PARENT}" >> $GITHUB_ENV
        echo "SIGN_EXECUTABLES=/tmp/castle-build-ci/windows/sign_executables" >> $GITHUB_ENV
        /tmp/castle-build-ci/windows/setup_signing

    - name: Pack Release (ZIP, Bundled FPC)
      env:
        # for Apple codesigning
        APPLE_IDENTITY: ${{ vars.APPLE_IDENTITY }}
        APPLE_BUILD_CERTIFICATE_BASE64: ${{ secrets.APPLE_BUILD_CERTIFICATE_BASE64 }}
        APPLE_P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
        APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        # for Apple notarization
        APPLE_ID: ${{ vars.APPLE_ID }}
        APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        # for Azure (Windows) codesigning
        AZURE_ENDPOINT: ${{ vars.AZURE_ENDPOINT }}
        AZURE_CODESIGNING_ACCOUNT_NAME: ${{ vars.AZURE_CODESIGNING_ACCOUNT_NAME }}
        AZURE_CERTIFICATE_PROFILE_NAME: ${{ vars.AZURE_CERTIFICATE_PROFILE_NAME }}
      run: |
        export CGE_PACK_BUNDLE=yes

        # Sign (for Windows and Apple), only on chosen branches
        # (Azure federated login only works on specific branches)
        if [[ "${GITHUB_REF}" == "refs/heads/master" || "${GITHUB_REF}" == "refs/heads/windows-code-signing" ]]; then
          if [[ "${{ matrix.build_os }}" == "darwin" ]]; then
            export APPLE_BUNDLE_NOTARIZE="/tmp/castle-build-ci/apple/sign_notarize_bundle"
            export SIGN_EXECUTABLES="/tmp/castle-build-ci/apple/sign_executables"
            /tmp/castle-build-ci/apple/setup_signing
          fi
        fi

        ./tools/internal/pack_release/pack_release.sh ${{ matrix.build_os }} ${{ matrix.build_cpu }}

    - name: Archive Artifacts (zip)
      # We don't archive build on:
      #
      # - linux-x86_64, because the test-and-pack-docker.yml is also doing
      #   equivalent build (castle-engine-7.0-alpha.snapshot-linux-x86_64.zip).
      #
      #   The Docker job is a bit better:
      #   - PasDoc version from Docker is slightly different (advantage,
      #     we control PasDoc version in Docker better, consistent with others).
      #   - Docker build is a bit safer, as packing is a separate job,
      #     not depending that cge_clean_all in pack_release.sh
      #     cleans everything.
      if: ${{ matrix.job-name != 'linux-x86_64' }}
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.job-name }}-release
        path: "castle-engine*.zip"
        if-no-files-found: error

    # Only for Win64: make also non-bundled release.
    # (Not done for others, as they would consume lots of disk space and time for little gain.)
    - name: Pack Release (ZIP, Not Bundled)
      if: ${{ matrix.job-name == 'win64-x86_64' }}
      env:
        # for Azure (Windows) codesigning
        AZURE_ENDPOINT: ${{ vars.AZURE_ENDPOINT }}
        AZURE_CODESIGNING_ACCOUNT_NAME: ${{ vars.AZURE_CODESIGNING_ACCOUNT_NAME }}
        AZURE_CERTIFICATE_PROFILE_NAME: ${{ vars.AZURE_CERTIFICATE_PROFILE_NAME }}
      run: |
        export CGE_PACK_BUNDLE=no
        ./tools/internal/pack_release/pack_release.sh ${{ matrix.build_os }} ${{ matrix.build_cpu }}

    - name: Archive Artifacts (nobundle-release)
      if: ${{ matrix.job-name == 'win64-x86_64' }}
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.job-name }}-nobundle-release
        path: "castle-engine*.zip"
        if-no-files-found: error

    # Only for Win64: Pack Windows installer (InnoSetup) release.
    # This passes a subset of previous "Pack Release (ZIP, Bundled FPC)"
    # env variables, just because there's no point configuring Apple signing
    # -- this is Windows-only.
    - name: Pack Release (Windows Installer, Bundled FPC)
      if: ${{ matrix.job-name == 'win64-x86_64' }}
      env:
        # for Azure (Windows) codesigning
        AZURE_ENDPOINT: ${{ vars.AZURE_ENDPOINT }}
        AZURE_CODESIGNING_ACCOUNT_NAME: ${{ vars.AZURE_CODESIGNING_ACCOUNT_NAME }}
        AZURE_CERTIFICATE_PROFILE_NAME: ${{ vars.AZURE_CERTIFICATE_PROFILE_NAME }}
      run: |
        export CGE_PACK_BUNDLE=yes
        ./tools/internal/pack_release/pack_release.sh windows_installer

    - name: Archive Artifacts (installer-release)
      if: ${{ matrix.job-name == 'win64-x86_64' }}
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.job-name }}-installer-release
        path: "castle-engine-setup-*.exe"
        if-no-files-found: error
